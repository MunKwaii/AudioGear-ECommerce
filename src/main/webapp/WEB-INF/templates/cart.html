<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - AudioGear</title>
    <!-- Use the same Google Fonts as Home -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0a0a0c;
            --surface-color: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --text-main: #f0f0f0;
            --text-muted: #8892b0;
            --danger: #ff4757;
            --warning: #ffa502;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
        }



        .cart-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            flex: 1;
        }

        h1.page-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            grid-column: 1 / -1;
            font-weight: 700;
        }

        /* Cart Items Glass Table */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            border-color: rgba(0, 242, 254, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .item-img {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            background: #1a1a1a;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .item-price {
            color: var(--primary-glow);
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Quantity controls */
        .quantity-form {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            overflow: hidden;
        }

        .qty-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .qty-input {
            width: 50px;
            background: transparent;
            border: none;
            color: var(--text-main);
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            pointer-events: none;
            /* read only feel but submits */
        }

        /* Total Price per Item */
        .item-total {
            font-size: 1.2rem;
            font-weight: 700;
            width: 120px;
            text-align: right;
        }

        /* Action Forms */
        .action-form {
            margin: 0;
        }

        .remove-btn {
            background: rgba(255, 71, 87, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .remove-btn:hover {
            background: rgba(255, 71, 87, 0.2);
            transform: scale(1.1);
        }

        /* Order Summary Glass Panel */
        .cart-summary {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .summary-total span.amount {
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
        }

        /* Empty Cart State */
        .empty-cart {
            text-align: center;
            padding: 100px 0;
            grid-column: 1 / -1;
        }

        .empty-cart i {
            font-size: 5rem;
            color: var(--glass-border);
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .shop-now-btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .shop-now-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                top: 0;
                position: relative;
            }
        }

        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .item-total {
                width: 100%;
                text-align: left;
            }

            .action-form {
                position: absolute;
                top: 20px;
                right: 20px;
            }
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff6b81;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease-out;
            grid-column: 1 / -1;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>

    <!-- Header Fragment -->
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <div class="cart-container">
        <!-- Render Empty Cart if no items -->
        <div class="empty-cart" th:if="${cart == null || cart.items == null || cart.items.isEmpty()}">
            <i class="fas fa-shopping-bag"></i>
            <h2>Giỏ hàng của bạn đang trống</h2>
            <p>Khám phá ngay thế giới âm thanh đỉnh cao tại AudioGear!</p>
            <a th:href="@{/products}" class="shop-now-btn">Mua sắm ngay</a>
        </div>

        <!-- Error Alert -->
        <div class="alert-error" th:if="${session.cartError != null}">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${session.cartError}">Error message</span>
            <!-- Clear error after showing -->
            <th:block th:text="${#session.removeAttribute('cartError')}"></th:block>
        </div>

        <!-- Cart Content wrapper (only if items present) -->
        <th:block th:unless="${cart == null || cart.items == null || cart.items.isEmpty()}">

            <h1 class="page-title">Giỏ Hàng <span style="font-size: 1.2rem; color: var(--text-muted); font-weight: 400"
                    th:text="${'(' + cart.items.size() + ' sản phẩm)'}"></span></h1>

            <!-- Left side: Items -->
            <div class="cart-items">
                <div class="cart-item" th:each="item : ${cart.items}">

                    <img th:if="${item.productThumbnail == null || item.productThumbnail.trim().isEmpty()}"
                        class="item-img" th:src="@{/static/img/hero_bg.png}" alt="Product">
                    <img th:unless="${item.productThumbnail == null || item.productThumbnail.trim().isEmpty()}"
                        class="item-img" th:src="@{${item.productThumbnail}}" alt="Product">

                    <div class="item-details">
                        <h3 class="item-name" th:text="${item.productName}">Product Name</h3>
                        <div class="item-price"
                            th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}">1,000,000đ
                        </div>
                    </div>

                    <!-- form for updating minus -->
                    <form th:action="@{/cart/update}" method="post" class="action-form">
                        <input type="hidden" name="itemId" th:value="${item.id}" />
                        <div class="quantity-form">
                            <!-- Minus overrides quantity using JS trick or we do it inline -->
                            <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="qty-btn"
                                th:disabled="${item.quantity <= 1} ? 'disabled' : null"><i
                                    class="fas fa-minus"></i></button>
                            <input type="text" class="qty-input" th:value="${item.quantity}" readonly>
                            <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="qty-btn"
                                th:disabled="${item.quantity >= item.stockQuantity} ? 'disabled' : null">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </form>

                    <div class="item-total"
                        th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">
                        1,000,000đ
                    </div>

                    <!-- form for remove -->
                    <form th:action="@{/cart/remove}" method="post" class="action-form">
                        <input type="hidden" name="itemId" th:value="${item.id}" />
                        <button type="submit" class="remove-btn" title="Xoá"><i class="fas fa-trash"></i></button>
                    </form>

                </div>
            </div>

            <!-- Right side: Summary -->
            <div class="cart-summary">
                <h2 class="summary-title">Tóm tắt đơn hàng</h2>

                <div class="summary-row">
                    <span>Tạm tính</span>
                    <span th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
                </div>

                <div class="summary-row">
                    <span>Phí giao hàng</span>
                    <span>Miễn phí</span>
                </div>

                <div class="summary-total">
                    <span>Tổng cộng</span>
                    <span class="amount"
                        th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
                </div>

                <a th:href="@{/checkout}" class="checkout-btn" style="text-align: center; text-decoration: none; display: block;">Tiến hành thanh toán</a>
            </div>

        </th:block>
    </div>

    <!-- Footer Fragment -->
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>

</html>
