<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 
  Để nhúng thẻ Header này vào các trang khác, sử dụng cú pháp:
  <header th:replace="~{fragments/header :: headerFragment}"></header>
-->
<body>
    <header th:fragment="headerFragment" class="ag-header-wrapper">
        <style>
            /* ========== PREMIUM AUDIO GEAR HEADER CSS ========== */
            :root {
                --ag-primary: #00f2fe; /* Cyan/Blue accent */
                --ag-secondary: #4facfe; /* Light Blue */
                --ag-dark: #050505;
                --ag-dark-glass: rgba(5, 5, 5, 0.85);
                --ag-text: #ecf0f1;
                --ag-text-muted: #bdc3c7;
                --ag-border: #333333;
            }

            .ag-header-wrapper {
                position: sticky;
                top: 0;
                z-index: 1000;
                background-color: var(--ag-dark-glass);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--ag-border);
                font-family: 'Outfit', '-apple-system', 'Segoe UI', sans-serif;
                color: var(--ag-text);
                transition: all 0.3s ease;
            }

            .ag-header-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px 24px;
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                gap: 20px;
            }

            /* No search layout - Use Flex for Logo-Left Icons-Right */
            .ag-header-container.ag-no-search {
                display: flex;
                justify-content: space-between;
            }

            /* LOGO */
            .ag-logo {
                font-size: 24px;
                font-weight: 800;
                letter-spacing: 2px;
                text-decoration: none;
                color: #fff;
                display: flex;
                align-items: center;
                gap: 8px;
                text-transform: uppercase;
            }
            .ag-logo-accent {
                background: linear-gradient(to right, var(--ag-secondary), var(--ag-primary));
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            /* SEARCH BAR */
            .ag-search-box {
                flex-grow: 1;
                max-width: 500px;
                position: relative;
                display: flex;
                align-items: center;
            }
            .ag-search-input {
                width: 100%;
                padding: 12px 20px;
                padding-right: 45px;
                background-color: #222;
                border: 1px solid var(--ag-border);
                border-radius: 30px;
                color: var(--ag-text);
                font-size: 14px;
                outline: none;
                transition: border-color 0.3s, box-shadow 0.3s;
            }
            .ag-search-input:focus {
                border-color: var(--ag-primary);
                box-shadow: 0 0 0 2px rgba(241, 196, 15, 0.2);
            }
            .ag-search-btn {
                position: absolute;
                right: 15px;
                background: none;
                border: none;
                color: var(--ag-text-muted);
                cursor: pointer;
                transition: color 0.3s;
            }
            .ag-search-btn:hover {
                color: var(--ag-primary);
            }

            /* NAVIGATION & ICONS */
            .ag-header-nav {
                display: flex;
                align-items: center;
                gap: 24px;
                justify-self: end;
            }
            .ag-nav-item {
                text-decoration: none;
                color: var(--ag-text-muted);
                font-size: 14px;
                font-weight: 500;
                transition: color 0.3s;
                position: relative;
            }
            .ag-nav-item:hover {
                color: var(--ag-text);
            }
            
            /* CART ICON */
            .ag-cart-icon {
                position: relative;
                display: flex;
                align-items: center;
                color: var(--ag-text);
                text-decoration: none;
                transition: transform 0.2s;
            }
            .ag-cart-icon:hover {
                transform: scale(1.1);
            }
            .ag-cart-badge {
                position: absolute;
                top: -8px;
                right: -10px;
                background-color: var(--ag-primary);
                color: var(--ag-dark);
                font-size: 10px;
                font-weight: bold;
                padding: 2px 6px;
                border-radius: 10px;
                display: none; /* Hide by default, show only if count > 0 */
            }

            /* LOGIN BUTTON */
            .ag-btn-login {
                background-color: transparent;
                color: var(--ag-text);
                border: 1px solid var(--ag-text-muted);
                padding: 8px 16px;
                border-radius: 6px;
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                transition: all 0.3s;
            }
            .ag-btn-login:hover {
                background-color: var(--ag-text);
                color: var(--ag-dark);
            }
            
            /* PROFILE MENU */
            .ag-profile-menu {
                position: relative;
                display: inline-block;
            }
            .ag-profile-trigger {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background-color: #222;
                color: var(--ag-text);
                text-decoration: none;
                border: 1px solid var(--ag-border);
                transition: all 0.3s ease;
                cursor: pointer;
            }
            .ag-profile-menu:hover .ag-profile-trigger, .ag-profile-trigger:hover {
                border-color: var(--ag-primary);
                box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
                color: var(--ag-primary);
            }
            .ag-profile-dropdown {
                position: absolute;
                top: 120%;
                right: 0;
                width: 240px;
                background-color: var(--ag-dark-glass);
                backdrop-filter: blur(16px);
                border: 1px solid var(--ag-border);
                border-radius: 12px;
                padding: 8px 0;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px);
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                z-index: 1000;
            }
            .ag-profile-menu:hover .ag-profile-dropdown {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
            .ag-dropdown-header {
                padding: 12px 16px;
            }
            .ag-dropdown-name {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
                color: #fff;
                word-break: break-all;
            }
            .ag-dropdown-divider {
                height: 1px;
                background-color: var(--ag-border);
                margin: 8px 0;
            }
            .ag-dropdown-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 10px 16px;
                color: var(--ag-text-muted);
                text-decoration: none;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.2s;
            }
            .ag-dropdown-item:hover {
                background-color: rgba(255, 255, 255, 0.05);
                color: #fff;
                padding-left: 20px;
            }
            .ag-text-danger:hover {
                color: #ff4757 !important;
                background-color: rgba(255, 71, 87, 0.1) !important;
            }
            
            /* Dành cho Mobile thu gọn */
            @media (max-width: 768px) {
                .ag-search-box {
                    display: none; /* Cần logic hiện search overlay riêng cho mobile */
                }
                .ag-header-container {
                    padding: 12px 16px;
                }
            }
        </style>

        <div class="ag-header-container" th:classappend="${hideSearch} ? 'ag-no-search' : ''">
            <!-- 1. Logo -->
            <a th:href="@{/}" class="ag-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
                AUDIO<span class="ag-logo-accent">GEAR</span>
            </a>

            <!-- 2. Search (hidden on products page) -->
            <form th:action="@{/products}" method="GET" class="ag-search-box" th:if="${hideSearch == null || !hideSearch}">
                <input type="text" name="q" class="ag-search-input" placeholder="Tìm kiếm tai nghe, loa, amply...">
                <button type="submit" class="ag-search-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>

            <!-- 3. Actions -->
            <div class="ag-header-nav">
                <!-- Hiển thị khi chưa đăng nhập -->
                <a th:if="${currentUserId == null && (hideSearch == null || !hideSearch)}" th:href="@{/login}" class="ag-btn-login">Đăng Nhập</a>
                
                <!-- Hiển thị nếu đã đăng nhập -->
                <div th:if="${currentUserId != null}" class="ag-profile-menu">
                    <a href="javascript:void(0)" class="ag-profile-trigger">
                        <img th:if="${user != null and user.avatar != null}" th:src="@{${user.avatar}}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        <svg th:unless="${user != null and user.avatar != null}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </a>
                    <div class="ag-profile-dropdown">
                        <div class="ag-dropdown-header">
                            <p class="ag-dropdown-name" th:text="${currentUserEmail}">User Email</p>
                        </div>
                        <div class="ag-dropdown-divider"></div>
                        <a th:href="@{/profile}" class="ag-dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Hồ sơ cá nhân
                        </a>
                        <a th:href="@{/profile/addresses}" class="ag-dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            Sổ địa chỉ
                        </a>
                        <a th:href="@{/profile/orders}" class="ag-dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Đơn hàng của tôi
                        </a>
                        <div class="ag-dropdown-divider"></div>
                        <a th:href="@{/api/auth/logout}" class="ag-dropdown-item ag-text-danger">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Đăng xuất
                        </a>
                    </div>
                </div>

                <a th:href="@{/cart}" class="ag-cart-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <!-- Số lượng thực tế sẽ được cập nhật bởi JS hoặc rendered bởi Thymeleaf -->
                    <span class="ag-cart-badge" id="header-cart-badge" 
                          th:text="${cart != null && cart.items != null ? cart.items.size() : (session.guest_cart_count != null ? session.guest_cart_count : 0)}"
                          th:style="${(cart != null && cart.items != null && cart.items.size() > 0) || (session.guest_cart_count != null && session.guest_cart_count > 0) ? 'display: block' : 'display: none'}">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Script to update cart count -->
    <script th:inline="javascript">
        (function() {
            const contextPath = /*[[@{/}]]*/ '/';
            function updateHeaderCartBadge() {
                fetch(`${contextPath}cart/count`)
                    .then(res => res.json())
                    .then(data => {
                        const badge = document.getElementById('header-cart-badge');
                        if (badge) {
                            const count = parseInt(data.count) || 0;
                            badge.textContent = count;
                            // Update display and cache
                            badge.style.display = count > 0 ? 'block' : 'none';
                            sessionStorage.setItem('ag_cart_count', count);
                        }
                    })
                    .catch(err => console.error('Error fetching cart count:', err));
            }

            // Restore from cache immediately to avoid flicker
            const cachedCount = sessionStorage.getItem('ag_cart_count');
            if (cachedCount !== null) {
                const badge = document.getElementById('header-cart-badge');
                if (badge) {
                    badge.textContent = cachedCount;
                    badge.style.display = parseInt(cachedCount) > 0 ? 'block' : 'none';
                }
            }

            // Always fetch fresh count on load
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateHeaderCartBadge);
            } else {
                updateHeaderCartBadge();
            }
            
            // Expose globally
            window.updateHeaderCartBadge = updateHeaderCartBadge;

            // Global Toast Function
            window.showToast = function(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `ag-toast ${type}`;
                toast.textContent = message;
                
                // Styles match the premium theme
                Object.assign(toast.style, {
                    position: 'fixed',
                    bottom: '30px',
                    right: '30px',
                    padding: '12px 24px',
                    backgroundColor: type === 'success' ? 'rgba(39, 174, 96, 0.9)' : 'rgba(231, 76, 60, 0.9)',
                    backdropFilter: 'blur(8px)',
                    color: '#fff',
                    borderRadius: '30px',
                    boxShadow: '0 10px 30px rgba(0,0,0,0.5)',
                    zIndex: '9999',
                    fontSize: '14px',
                    fontWeight: '500',
                    border: '1px solid rgba(255,255,255,0.1)',
                    transition: 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    transform: 'translateY(100px)',
                    opacity: '0'
                });

                document.body.appendChild(toast);
                
                // Animation in
                setTimeout(() => {
                    toast.style.transform = 'translateY(0)';
                    toast.style.opacity = '1';
                }, 10);

                // Animation out
                setTimeout(() => {
                    toast.style.transform = 'translateY(100px)';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            };

            // Global Add to Cart Click Handler
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('.add-to-cart-btn');
                if (!btn) return;
                
                const productId = btn.dataset.productId;
                if (!productId) return; // Legacy form handling or missing ID

                // Prevent default if it's in a form
                e.preventDefault();

                const quantity = 1; // Default for quick add buttons
                
                btn.disabled = true;
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

                fetch(`${contextPath}cart/add`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: `productId=${productId}&quantity=${quantity}`
                })
                .then(res => {
                    if (res.ok) {
                        window.showToast('Đã thêm sản phẩm vào giỏ hàng!', 'success');
                        window.updateHeaderCartBadge();
                    } else {
                        return res.json().then(data => {
                            throw new Error(data.message || 'Lỗi khi thêm vào giỏ hàng');
                        }).catch(() => {
                            throw new Error('Lỗi khi thêm vào giỏ hàng');
                        });
                    }
                })
                .catch(err => {
                    window.showToast(err.message, 'error');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                });
            });
        })();
    </script>
</body>
</html>
