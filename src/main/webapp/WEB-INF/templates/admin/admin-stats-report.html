<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: adminLayout(${title}, ${activePage}, ~{::main}, ~{::style}, ~{::script})}">

<head>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(25, 25, 25, 0.8);
            --surface2: rgba(40, 40, 40, 0.9);
            --border: rgba(255, 255, 255, .08);
            --accent: #00f2fe;
            --accent-hover: #4facfe;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --purple: #a855f7;
            --blue: #3b82f6;
            --orange: #f97316;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, .6);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 24px;
        }

        .header-title-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .time-filter {
            display: flex;
            gap: 6px;
            background: rgba(40, 40, 40, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 5px;
            margin-left: auto;
        }

        @media (max-width: 600px) {
            .time-filter {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }
        }

        .time-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: .85rem;
            cursor: pointer;
            transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .time-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .08);
        }

        .time-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1100px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all .2s;
        }

        .stat-card:hover {
            border-color: rgba(0, 242, 254, .3);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .stat-sub {
            font-size: .78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .bg-accent {
            background: rgba(0, 242, 254, .15);
            color: var(--accent);
        }

        .bg-green {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
        }

        .bg-yellow {
            background: rgba(234, 179, 8, .15);
            color: var(--yellow);
        }

        .bg-red {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
        }

        .bg-purple {
            background: rgba(168, 85, 247, .15);
            color: var(--purple);
        }

        .bg-blue {
            background: rgba(59, 130, 246, .15);
            color: var(--blue);
        }

        .bg-orange {
            background: rgba(249, 115, 22, .15);
            color: var(--orange);
        }

        .section-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1100px) {
            .section-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
            margin-bottom: 20px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            width: 100px;
            font-size: .82rem;
            color: var(--text-muted);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            height: 24px;
            background: rgba(255, 255, 255, .04);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width .5s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
        }

        .bar-value {
            font-size: .75rem;
            font-weight: 700;
            color: #000;
            white-space: nowrap;
        }

        .top-table {
            width: 100%;
            border-collapse: collapse;
        }

        .top-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .top-table td {
            padding: 10px 12px;
            font-size: .88rem;
            border-bottom: 1px solid var(--border);
            transition: background .2s;
        }

        .top-table tbody tr:hover td {
            background: rgba(255, 255, 255, .05);
        }

        .top-table tr:last-child td {
            border-bottom: none;
        }

        .top-thumb {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .rank-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: .72rem;
            font-weight: 800;
        }

        .rank-1 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
        }

        .rank-2 {
            background: linear-gradient(135deg, #94a3b8, #64748b);
            color: #000;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7c2f, #b45309);
            color: #000;
        }

        .rank-default {
            background: var(--surface2);
            color: var(--text-muted);
        }

        .donut-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            min-height: 220px;
        }

        .donut-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            flex-shrink: 0;
        }

        .donut-canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 150px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: .85rem;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
        }

        .legend-label-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-value {
            font-weight: 700;
            color: var(--text);
        }

        .loading-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: .95rem;
        }

        .period-badge {
            font-size: .78rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <main>
        <div class="page-header">
            <div class="header-title-area">
                <div class="page-title">📊 Thống kê chi tiết</div>
                <div class="period-badge" id="periodBadge">Đang tải...</div>
            </div>
            <div class="time-filter" id="timeFilter">
                <button class="time-btn" data-range="7d">7 ngày</button>
                <button class="time-btn" data-range="30d">30 ngày</button>
                <button class="time-btn" data-range="90d">90 ngày</button>
                <button class="time-btn" data-range="1y">1 năm</button>
                <button class="time-btn" data-range="all">Toàn bộ</button>
            </div>
        </div>

        <div id="statsContent">
            <div class="loading-overlay">⏳ Đang tải dữ liệu thống kê...</div>
        </div>
    </main>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const contextPath = /*[[@{/}]]*/ '/';
        const API_URL = contextPath + 'api/admin/stats-report';
        let currentRange = '7d';
        let isFetching = false;
        let chartInstances = [];

        function getAuthToken() {
            const c = document.cookie.split(';').map(s => s.trim()).find(s => s.startsWith('accessToken='));
            return c ? c.split('=')[1] : (localStorage.getItem('accessToken') || '');
        }

        async function loadStats(range) {
            if (isFetching) return;
            console.log(`[StatsTrace] loadStats called for range: ${range} at ${new Date().toISOString()}`);
            isFetching = true;
            currentRange = range;

            document.querySelectorAll('.time-btn').forEach(b => b.classList.toggle('active', b.dataset.range === range));

            const statsEl = document.getElementById('statsContent');
            if (!statsEl.innerHTML.trim()) {
                statsEl.innerHTML = '<div class="loading-overlay">⏳ Đang tải dữ liệu thống kê...</div>';
            }

            try {
                const resp = await fetch(`${API_URL}?range=${range}`, {
                    headers: { 'Authorization': 'Bearer ' + getAuthToken() }
                });
                const data = await resp.json();

                // Critical: Destroy old charts before rendering new ones
                destroyCharts();

                if (data.success) {
                    requestAnimationFrame(() => renderDashboard(data));
                } else {
                    statsEl.innerHTML = `<div class="loading-overlay">❌ ${data.message || 'Lỗi tải dữ liệu'}</div>`;
                }
            } catch (e) {
                console.error('[StatsError]', e);
                statsEl.innerHTML = `<div class="loading-overlay">❌ Lỗi kết nối: ${e.message}</div>`;
            } finally {
                isFetching = false;
            }
        }

        function destroyCharts() {
            if (chartInstances.length === 0) return;
            console.log(`[StatsTrace] destroyCharts clearing ${chartInstances.length} instances`);

            while (chartInstances.length > 0) {
                const chart = chartInstances.pop();
                if (chart) {
                    try {
                        chart.stop();
                        const ctx = chart.ctx;
                        if (ctx && ctx.canvas) {
                            // Explicitly clear and zero-size the canvas to aid GC
                            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                            ctx.canvas.width = 0;
                            ctx.canvas.height = 0;
                            // Remove any potential listeners attached by Chart.js
                            const newCanvas = ctx.canvas.cloneNode(true);
                            ctx.canvas.parentNode?.replaceChild(newCanvas, ctx.canvas);
                        }
                        chart.destroy();
                    } catch (e) {
                        console.warn('[StatsCleanupWarning]', e);
                    }
                }
            }
            chartInstances = [];
        }

        let renderId = 0;
        function renderDashboard(data) {
            const currentId = ++renderId;
            console.log(`[StatsTrace] renderDashboard #${currentId} starting at ${new Date().toISOString()}`);

            document.getElementById('periodBadge').textContent = `${data.period.label} (${data.period.from} → ${data.period.to})`;

            const r = data.revenue, o = data.orders, p = data.products, u = data.users, br = data.brands, ca = data.categories;

            let html = '';

            html += `<div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-accent">💰</div>
                <div class="stat-label">Doanh thu</div>
                <div class="stat-value">${fmtMoney(r.total)} VND</div>
                <div class="stat-sub">TB: ${fmtMoney(r.avgOrderValue)} VND | Max: ${fmtMoney(r.highestOrder)} VND | Min: ${fmtMoney(r.lowestOrder)} VND</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-green">📦</div>
                <div class="stat-label">Đơn hàng</div>
                <div class="stat-value">${o.total}</div>
                <div class="stat-sub">Hoàn thành: ${o.completed} · Hủy: ${o.cancelled} · Tỷ lệ: ${o.completionRate.toFixed(1)}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-blue">🧾</div>
                <div class="stat-label">Sản phẩm</div>
                <div class="stat-value">${p.total}</div>
                <div class="stat-sub">Đang bán: ${p.active} · Ngừng bán: ${p.inactive} · Giá TB: ${fmtMoney(p.avgPrice)} VND</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-purple">👤</div>
                <div class="stat-label">Người dùng</div>
                <div class="stat-value">${u.total}</div>
                <div class="stat-sub">Khách: ${u.customerCount} · Admin: ${u.adminCount} · Khóa: ${u.locked}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-red">⚠️</div>
                <div class="stat-label">Cảnh báo kho</div>
                <div class="stat-value">${p.lowStock + p.outOfStock}</div>
                <div class="stat-sub">Sắp hết hàng: ${p.lowStock} · Tạm hết: ${p.outOfStock}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-orange">🏷️</div>
                <div class="stat-label">Thương hiệu</div>
                <div class="stat-value">${br.total}</div>
                <div class="stat-sub">Đang có SP: ${br.withProducts} · Trống: ${br.withoutProducts}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-yellow">📁</div>
                <div class="stat-label">Danh mục</div>
                <div class="stat-value">${ca.total}</div>
                <div class="stat-sub">Đang có SP: ${ca.withProducts} · Trống: ${ca.withoutProducts}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-accent">📈</div>
                <div class="stat-label">Hiệu suất</div>
                <div class="stat-value">${o.completionRate.toFixed(1)}%</div>
                <div class="stat-sub">Đang xử lý: ${o.processing} · Đang giao: ${o.shipped}</div>
            </div>
        </div>`;

            html += `<div class="section-grid">
            <div class="card">
                <div class="card-title">📈 Doanh thu theo ngày</div>
                <div class="chart-container" style="height:320px; overflow:hidden;"><canvas id="revenueChart"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">📊 Đơn hàng theo trạng thái</div>
                <div class="donut-container">
                    <div class="donut-wrapper">
                        <canvas id="orderDonut" class="donut-canvas"></canvas>
                    </div>
                    <div class="donut-legend" id="orderLegend"></div>
                </div>
            </div>
        </div>`;

            html += `<div class="section-grid">
            <div class="card">
                <div class="card-title">🏷️ Doanh số theo thương hiệu</div>
                <div class="bar-chart" id="brandBars"></div>
            </div>
            <div class="card">
                <div class="card-title">📁 Doanh số theo danh mục</div>
                <div class="bar-chart" id="categoryBars"></div>
            </div>
        </div>`;

            html += `<div class="section-grid">
            <div class="card">
                <div class="card-title">🏆 Top sản phẩm bán chạy (SL)</div>
                <table class="top-table">
                    <thead><tr><th style="width:40px">#</th><th>Sản phẩm</th><th style="text-align:right">SL bán</th></tr></thead>
                    <tbody id="topSellingBody"></tbody>
                </table>
            </div>
            <div class="card">
                <div class="card-title">💎 Top sản phẩm doanh thu cao</div>
                <table class="top-table">
                    <thead><tr><th style="width:40px">#</th><th>Sản phẩm</th><th style="text-align:right">Doanh thu</th></tr></thead>
                    <tbody id="topRevenueBody"></tbody>
                </table>
            </div>
        </div>`;

            html += `<div class="section-grid">
            <div class="card">
                <div class="card-title">👥 Phân tích người dùng</div>
                <div class="bar-chart" id="userBars"></div>
            </div>
            <div class="card">
                <div class="card-title">📦 Phân tích đơn hàng</div>
                <div class="bar-chart" id="orderDetailBars"></div>
            </div>
        </div>`;

            document.getElementById('statsContent').innerHTML = html;

            renderRevenueChart(data.revenueByDay);
            renderOrderDonut(data.ordersByStatus);
            renderBarChart('brandBars', data.salesByBrand, 'sp', ['#00f2fe', '#4facfe', '#22c55e', '#eab308', '#a855f7', '#f97316', '#ef4444']);
            renderBarChart('categoryBars', data.salesByCategory, 'sp', ['#22c55e', '#00f2fe', '#4facfe', '#eab308', '#a855f7', '#f97316']);
            renderTopTable('topSellingBody', data.topSellingProducts, 'qty');
            renderTopTable('topRevenueBody', data.topRevenueProducts, 'rev');
            renderUserBars(data.users);
            renderOrderDetailBars(data.orders);
        }

        function fmtMoney(n) { return Math.round(Number(n)).toLocaleString('vi-VN'); }

        function renderRevenueChart(dataMap) {
            const canvas = document.getElementById('revenueChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const labels = Object.keys(dataMap);
            const values = Object.values(dataMap).map(Number);
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(0,242,254,.35)');
            gradient.addColorStop(1, 'rgba(0,242,254,0)');

            chartInstances.push(new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Doanh thu',
                        data: values,
                        borderColor: '#00f2fe',
                        borderWidth: 3,
                        pointBackgroundColor: '#00f2fe',
                        pointRadius: 4,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    resizeDelay: 150,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#94a3b8', callback: v => fmtMoney(v) + ' VND' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', maxRotation: 45 } }
                    }
                }
            }));
        }

        function renderOrderDonut(dataMap) {
            const canvas = document.getElementById('orderDonut');
            const legend = document.getElementById('orderLegend');
            if (!canvas || !legend) return;

            const colors = { PENDING: '#eab308', PROCESSING: '#3b82f6', SHIPPED: '#a855f7', DELIVERED: '#22c55e', CANCELLED: '#ef4444' };
            const labels = { PENDING: 'Chờ xử lý', PROCESSING: 'Đang xử lý', SHIPPED: 'Đang giao', DELIVERED: 'Hoàn thành', CANCELLED: 'Đã hủy' };

            const entries = Object.entries(dataMap).filter(([, v]) => v > 0);
            chartInstances.push(new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: entries.map(([k]) => labels[k] || k),
                    datasets: [{ data: entries.map(([, v]) => v), backgroundColor: entries.map(([k]) => colors[k] || '#666'), borderWidth: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    resizeDelay: 150,
                    plugins: { legend: { display: false } },
                    cutout: '72%'
                }
            }));

            legend.innerHTML = entries.map(([k, v]) =>
                `<div class="legend-item">
                <div class="legend-label-group">
                    <div class="legend-dot" style="background:${colors[k] || '#666'}"></div>
                    <span>${labels[k] || k}</span>
                </div>
                <span class="legend-value">${v}</span>
            </div>`
            ).join('');
        }

        function renderBarChart(containerId, dataMap, suffix, colors) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const entries = Object.entries(dataMap).sort((a, b) => b[1] - a[1]);
            const maxVal = entries.length > 0 ? entries[0][1] : 1;

            container.innerHTML = entries.map(([label, val], i) => {
                const pct = (val / maxVal * 100).toFixed(1);
                const color = colors[i % colors.length];
                return `<div class="bar-row">
                <div class="bar-label" title="${label}">${label}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"><span class="bar-value">${val} ${suffix}</span></div></div>
            </div>`;
            }).join('');
        }

        function renderTopTable(tbodyId, items, mode) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            if (!items || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:30px">Không có dữ liệu</td></tr>';
                return;
            }
            tbody.innerHTML = items.map((item, i) => {
                const rankClass = i < 3 ? `rank-${i + 1}` : 'rank-default';
                const thumb = item.thumbnailUrl
                    ? `<div style="width:32px;height:32px;background:#1a1a1a;border-radius:6px;overflow:hidden;flex-shrink:0;">
                    <img class="top-thumb" src="${item.thumbnailUrl}" alt="" loading="lazy" 
                        onerror="this.style.visibility='hidden';this.parentElement.style.background='rgba(255,255,255,0.05)'">
                   </div>`
                    : '';
                const val = mode === 'qty' ? `${item.quantitySold} SP` : `${fmtMoney(item.totalRevenue)} VND`;
                return `<tr>
                <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
                <td><div style="display:flex;align-items:center;gap:10px">${thumb}<span>${item.name}</span></div></td>
                <td style="text-align:right;font-weight:700">${val}</td>
            </tr>`;
            }).join('');
        }

        function renderUserBars(data) {
            const container = document.getElementById('userBars');
            if (!container) return;
            const items = [
                { label: 'Active', value: data.active, color: '#22c55e' },
                { label: 'Locked', value: data.locked, color: '#ef4444' },
                { label: 'Pending', value: data.pending, color: '#eab308' },
                { label: 'Admin', value: data.adminCount, color: '#a855f7' },
                { label: 'Customer', value: data.customerCount, color: '#3b82f6' }
            ];
            const maxVal = Math.max(...items.map(i => i.value), 1);
            container.innerHTML = items.map(item => {
                const pct = (item.value / maxVal * 100).toFixed(1);
                return `<div class="bar-row">
                <div class="bar-label">${item.label}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${item.color}"><span class="bar-value">${item.value}</span></div></div>
            </div>`;
            }).join('');
        }

        function renderOrderDetailBars(data) {
            const container = document.getElementById('orderDetailBars');
            if (!container) return;
            const items = [
                { label: 'Tổng', value: data.total, color: '#00f2fe' },
                { label: 'Hoàn thành', value: data.completed, color: '#22c55e' },
                { label: 'Đang giao', value: data.shipped, color: '#a855f7' },
                { label: 'Đang xử lý', value: data.processing, color: '#3b82f6' },
                { label: 'Chờ xử lý', value: data.pending, color: '#eab308' },
                { label: 'Đã hủy', value: data.cancelled, color: '#ef4444' }
            ];
            const maxVal = Math.max(...items.map(i => i.value), 1);
            container.innerHTML = items.map(item => {
                const pct = (item.value / maxVal * 100).toFixed(1);
                return `<div class="bar-row">
                <div class="bar-label">${item.label}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${item.color}"><span class="bar-value">${item.value}</span></div></div>
            </div>`;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('timeFilter').addEventListener('click', function (e) {
                const btn = e.target.closest('.time-btn');
                if (btn) loadStats(btn.dataset.range);
            });
            loadStats('7d');
        });
        /*]]>*/
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
