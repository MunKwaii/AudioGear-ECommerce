<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: adminLayout(${title}, ${activePage}, ~{::main}, ~{::style}, ~{::script})}">
<head>
    <style>
        :root {
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: rgba(255,255,255,.08);
            --accent: #6c63ff;
            --accent-hover: #7d75ff;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,.45);
            --green: #22c55e;
            --red: #ef4444;
        }

        .page-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 16px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        @media (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        label { display: block; font-weight: 700; margin-bottom: 6px; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: inherit;
            font-size: .95rem;
        }
        textarea { min-height: 120px; resize: vertical; }
        .actions { display: flex; gap: 10px; margin-top: 16px; }
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: rgba(255,255,255,.08); color: var(--text); border: 1px solid var(--border); }
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .alert-success { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.4); }
        .alert-error { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.4); }
        .muted { color: var(--text-muted); font-size: .85rem; }
    </style>
</head>
<body>
<main>
    <div class="page-title">🧾 Thêm sản phẩm mới</div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="card">
        <form th:action="@{/admin/products/new}" method="post">
            <div class="form-grid">
                <div>
                    <label for="name">Tên sản phẩm</label>
                    <input id="name" name="name" type="text" placeholder="VD: Tai nghe Bluetooth" th:value="${form.name}" required>
                </div>
                <div>
                    <label for="price">Giá</label>
                    <input id="price" name="price" type="text" placeholder="VD: 1999000" th:value="${form.price}" required>
                </div>
                <div>
                    <label for="stockQuantity">Tồn kho</label>
                    <input id="stockQuantity" name="stockQuantity" type="number" min="0" placeholder="0" th:value="${form.stockQuantity}" required>
                </div>
                <div>
                    <label for="thumbnailUrl">URL ảnh (local)</label>
                    <input id="thumbnailUrl" name="thumbnailUrl" type="text" placeholder="/uploads/products/xxx.jpg" th:value="${form.thumbnailUrl}">
                    <div class="muted">Lưu link ảnh local vào DB, không upload file ở đây.</div>
                </div>
                <div>
                    <label for="categoryId">Danh mục</label>
                    <select id="categoryId" name="categoryId" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${form.categoryId} == ${c.id} + ''"></option>
                    </select>
                </div>
                <div>
                    <label for="brandId">Thương hiệu</label>
                    <select id="brandId" name="brandId" required>
                        <option value="">-- Chọn thương hiệu --</option>
                        <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}" th:selected="${form.brandId} == ${b.id} + ''"></option>
                    </select>
                </div>
                <div style="grid-column: 1 / -1;">
                    <label for="description">Mô tả</label>
                    <textarea id="description" name="description" placeholder="Mô tả ngắn" th:text="${form.description}"></textarea>
                </div>
                <div style="grid-column: 1 / -1;">
                    <label for="specifications">Thông số (JSON)</label>
                    <textarea id="specifications" name="specifications" placeholder='{"driver":"40mm","battery":"20h"}' th:text="${form.specifications}"></textarea>
                </div>
                <div>
                    <label for="status">Trạng thái</label>
                    <select id="status" name="status">
                        <option value="true" th:selected="${form.status} == null or ${form.status} == 'true'">Đang bán</option>
                        <option value="false" th:selected="${form.status} == 'false'">Ngưng bán</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Lưu sản phẩm</button>
                <button class="btn btn-secondary" type="reset">Làm mới</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
