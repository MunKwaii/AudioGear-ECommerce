<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGear Logic - Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .register-container h2 {
            margin-bottom: 25px;
            color: #2f3640;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #353b48;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-register {
            background-color: #44bd32;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-register:hover {
            background-color: #4cd137;
        }
        .error-message {
            color: red;
            margin-bottom: 15px;
        }
        .login-link {
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>AudioGear Register</h2>

    <!-- Hiển thị lỗi validate hoặc lỗi nghiệp vụ trong quá trình đăng ký -->
    <div class="error-message" th:if="${error}" th:text="${error}"></div>

    <!-- Form đăng ký tài khoản local -->
    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" name="username" th:value="${username}" required>
        </div>

        <div class="form-group">
            <label for="fullName">Họ và tên</label>
            <input type="text" id="fullName" name="fullName" th:value="${fullName}" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" th:value="${email}" required>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn-register">Đăng ký</button>
    </form>

    <div class="login-link">
        Đã có tài khoản?
        <a th:href="@{/login}">Đăng nhập</a>
    </div>
</div>

</body>
</html>
