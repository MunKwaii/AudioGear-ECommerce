<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGear Logic - Đăng Ký</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #2f3640;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #353b48;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-login {
            background-color: #0097e6;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-login:hover {
            background-color: #00a8ff;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-links a {
            color: #0097e6;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Trở Thành Thành Viên</h2>

        <form action="" method="post" id="registerForm">
            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên..." required>
            </div>
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập..." required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập email của bạn..." required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xác nhận Mật khẩu</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Đăng ký tài khoản</button>
        </form>

        <div class="footer-links">
            Đã có tài khoản? <a th:href="@{/login}">Đăng nhập ngay</a>
        </div>
    </div>

    <script th:inline="javascript">
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Ngăn chặn submit form mặc định (gây ra lỗi 405)

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Mật khẩu xác nhận không khớp! Vui lòng kiểm tra lại.");
                return;
            }

            const btn = document.querySelector('.btn-login');
            btn.textContent = "Đang xử lý...";
            btn.disabled = true;

            const data = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password
            };

            try {
                // Thymeleaf sẽ tự động sinh đường dẫn hoàn chỉnh bao gồm thư mục dự án (Context Path)
                const apiUrl = /*[[@{/api/auth/register}]]*/ '/api/auth/register';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Parse response, nếu response không phải JSON (VD: 404 HTML) thì sẽ vướng vào catch
                const textResponse = await response.text();
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch (e) {
                    console.error("Not a valid JSON:", textResponse);
                    throw new Error("Server trả về lỗi không đọc được định dạng (Có thể sai đường dẫn api!). HTTP Status: " + response.status);
                }

                if (response.ok && result.success) {
                    alert(result.message + " Vui lòng kiểm tra email để lấy mã mới nhất, sau đó gọi /api/auth/register/verify qua Postman (hoặc UI nếu ráp tiếp) để hoàn tất.");

                    const loginUrl = /*[[@{/login}]]*/ '/login';
                    window.location.href = loginUrl;
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (error) {
                alert("Lỗi: " + error.message);
                console.error(error);
            } finally {
                btn.textContent = "Đăng ký tài khoản";
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
