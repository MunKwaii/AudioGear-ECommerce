<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGear - Sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(25, 25, 25, 0.6);
            --surface-hover: rgba(40, 40, 40, 0.8);
            --primary-glow: #00f2fe;
            --second-glow: #4facfe;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- Navbar --- */
        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--second-glow), var(--primary-glow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary-glow);
        }

        /* --- Layout --- */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 50px;
            gap: 40px;
        }

        /* --- Sidebar Filter --- */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
        }

        .filter-section {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .filter-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            margin-bottom: 12px;
        }

        .category-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-link:hover,
        .category-link.active {
            color: var(--primary-glow);
        }

        .category-link i {
            font-size: 12px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .category-link.active i {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input {
            flex-grow: 1;
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-glow);
        }

        .search-btn {
            background: linear-gradient(45deg, var(--primary-glow), var(--second-glow));
            border: none;
            color: #000;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.4);
        }

        .results-info {
            margin-bottom: 30px;
            color: var(--text-muted);
            font-size: 16px;
        }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* Same product card as home */
        .product-card {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: translateZ(0);
            /* Hardware Acceleration Hotfix */
            will-change: transform;
            /* Hardware Acceleration Hotfix */
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #111;
        }

        .product-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
        }

        .product-brand {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-glow);
        }

        .add-to-cart-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .product-card:hover .add-to-cart-btn {
            background: var(--primary-glow);
            color: #000;
        }

        /* --- Pagination --- */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 50px;
        }

        .page-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
            height: 45px;
            border-radius: 10px;
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0 15px;
        }

        .page-item:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .page-item.active {
            background: var(--primary-glow);
            color: #000;
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .page-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <nav>
        <a th:href="@{/}" class="logo" style="text-decoration: none;">AUDIOGEAR</a>
        <div class="nav-links">
            <a th:href="@{/}">Trang chủ</a>
            <a th:href="@{/products}" class="active">Sản phẩm</a>
            <a href="#">Về chúng tôi</a>
        </div>
        <div class="nav-icons" style="font-size: 20px; display: flex; gap: 20px;">
            <a href="#" style="color: #fff; transition: 0.3s; text-decoration: none;"><i class="fas fa-search"></i></a>
            <a th:href="@{/cart}" style="color: #fff; transition: 0.3s; text-decoration: none;"><i
                    class="fas fa-shopping-bag"></i></a>
            <a th:href="@{/login}" style="color: #fff; transition: 0.3s; text-decoration: none;"><i
                    class="fas fa-user"></i></a>
        </div>
    </nav>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="filter-section">
                <h3 class="filter-title">Danh mục</h3>
                <ul class="category-list">
                    <li class="category-item">
                        <a th:href="@{/products(q=${keyword})}" th:classappend="${categoryId == null} ? 'active' : ''"
                            class="category-link">
                            <i class="fas fa-chevron-right"></i> Tất cả sản phẩm
                        </a>
                    </li>
                    <li class="category-item" th:each="cat : ${categories}">
                        <a th:href="@{/products(catId=${cat.id}, q=${keyword})}"
                            th:classappend="${categoryId == cat.id} ? 'active' : ''" class="category-link">
                            <i class="fas fa-chevron-right"></i> <span th:text="${cat.name}">Category</span>
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search Form -->
            <form action="/products" method="GET" class="search-bar">
                <!-- Keep category selected if any -->
                <input type="hidden" name="catId" th:value="${categoryId}" th:if="${categoryId != null}">
                <input type="text" name="q" class="search-input" placeholder="Tìm kiếm tai nghe, loa..."
                    th:value="${keyword}">
                <button type="submit" class="search-btn"><i class="fas fa-search"></i> Tìm kiếm</button>
            </form>

            <div class="results-info">
                <span>Hiển thị <span th:text="${productPage.totalElements}">0</span> kết quả.</span>
                <span th:if="${keyword != null and !keyword.isEmpty()}"
                    th:text="' Kết quả tìm kiếm cho: &quot;' + ${keyword} + '&quot;'"></span>
            </div>

            <!-- Empty State -->
            <div th:if="${productPage.totalElements == 0}"
                style="text-align: center; padding: 100px 0; color: var(--text-muted);">
                <i class="fas fa-box-open" style="font-size: 60px; margin-bottom: 20px; opacity: 0.5;"></i>
                <h2>Không tìm thấy sản phẩm nào!</h2>
                <p>Vui lòng thử lại với từ khóa khác.</p>
            </div>

            <!-- Product Grid -->
            <div class="product-grid" th:if="${productPage.totalElements > 0}">
                <div class="product-card" th:each="prod : ${productPage.content}">
                    <a th:href="@{/product/{id}(id=${prod.id})}" class="product-img-link">
                        <div class="product-img-wrapper">
                            <img th:if="${prod.thumbnailUrl == null || prod.thumbnailUrl.trim().isEmpty()}"
                                class="product-img" th:src="@{/static/img/hero_bg.png}" alt="Product">
                             <img th:unless="${prod.thumbnailUrl == null || prod.thumbnailUrl.trim().isEmpty()}"
                                 class="product-img" 
                                 th:src="${prod.thumbnailUrl.startsWith('/images/products/')} ? @{'/static' + ${prod.thumbnailUrl}} : @{${prod.thumbnailUrl}}" 
                                 alt="Product"
                                 onerror="this.style.display='none'">
                        </div>
                    </a>
                    <div class="product-brand" th:text="${prod.brandName}">Brand</div>
                    <a th:href="@{/product/{id}(id=${prod.id})}" style="text-decoration: none; color: inherit;">
                        <h3 class="product-title" th:text="${prod.name}">Product Name</h3>
                    </a>
                    <div class="product-footer">
                        <span class="product-price"
                            th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                        <form th:action="@{/cart/add}" method="post" style="margin: 0;">
                            <input type="hidden" name="productId" th:value="${prod.id}" />
                            <input type="hidden" name="quantity" value="1" />
                            <button type="submit" class="add-to-cart-btn" title="Thêm vào giỏ">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div class="pagination" th:if="${productPage.totalPages > 1}">
                <!-- Nút Prev -->
                <a th:href="@{/products(page=${productPage.currentPage - 1}, q=${keyword}, catId=${categoryId})}"
                    class="page-item" th:classappend="${!productPage.hasPrevious} ? 'disabled' : ''">
                    <i class="fas fa-chevron-left"></i>
                </a>

                <!-- Hiển thị dãy số trang -->
                <th:block th:each="i : ${#numbers.sequence(1, productPage.totalPages)}">
                    <a th:href="@{/products(page=${i}, q=${keyword}, catId=${categoryId})}" class="page-item"
                        th:classappend="${productPage.currentPage == i} ? 'active' : ''" th:text="${i}">1</a>
                </th:block>

                <!-- Nút Next -->
                <a th:href="@{/products(page=${productPage.currentPage + 1}, q=${keyword}, catId=${categoryId})}"
                    class="page-item" th:classappend="${!productPage.hasNext} ? 'disabled' : ''">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>

        </main>

    </div>
</body>

</html>
