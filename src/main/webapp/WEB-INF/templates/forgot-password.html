<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioGear Logic - Quên Mật Khẩu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 10px;
            color: #2f3640;
        }
        .login-container p.subtitle {
            color: #7f8fa6;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #353b48;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-login {
            background-color: #0097e6;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #00a8ff;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 14px;
        }
        .footer-links a {
            color: #0097e6;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Khôi Phục Mật Khẩu</h2>
    <p class="subtitle">Nhập email của bạn để nhận mã OTP xác minh.</p>

    <!-- Bước 1: Nhập Email để nhận mã OTP -->
    <form action="" method="post" id="forgotPasswordForm">
        <div class="form-group">
            <label for="email">Địa chỉ Email</label>
            <input type="email" id="email" name="email" placeholder="VD: email_cua_ban@gmail.com" required>
        </div>
        <button type="submit" class="btn-login" id="sendOtpBtn">Gửi mã xác nhận</button>
    </form>

    <div class="footer-links">
        <a th:href="@{/login}">Quay lại trang Đăng nhập</a>
    </div>
</div>

<script th:inline="javascript">
    document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Ngăn submit form mặc định
        
        const btn = document.getElementById('sendOtpBtn');
        btn.textContent = "Đang gửi...";
        btn.disabled = true;

        const email = document.getElementById('email').value;

        try {
            const apiUrl = /*[[@{/api/auth/forgot-password/request}]]*/ '/api/auth/forgot-password/request';
            
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const textResponse = await response.text();
            let result;
            try {
                result = JSON.parse(textResponse);
            } catch(e) {
                console.error("Not a valid JSON:", textResponse);
                throw new Error("Server trả về lỗi không xác định (Có thể sai đường link API). HTTP Status: " + response.status);
            }
            
            if (response.ok && result.success) {
                alert(result.message + " Hãy dùng Postman gửi OTP tới /api/auth/forgot-password/reset để đặt lại mật khẩu của bạn.");
                // Thực tế bạn sẽ ẩn form này đi và show form nhập OTP + Pass mới lên.
            } else {
                alert("Lỗi: " + result.message);
            }
        } catch (error) {
            alert("Lỗi: " + error.message);
            console.error(error);
        } finally {
            btn.textContent = "Gửi mã xác nhận";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
