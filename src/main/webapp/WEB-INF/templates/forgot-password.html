<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: mainLayout(title='AudioGear - Quên Mật Khẩu', content=~{::pageContent}, extraStyles=~{::pageStyles}, extraScripts=~{::pageScripts}, hideSearch=true)}">

<!-- 1. STYLE DÀNH RIÊNG -->
<th:block th:fragment="pageStyles">
    <style>
        .auth-main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            min-height: calc(100vh - 200px);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 0;
            font-size: 28px;
            font-weight: 800;
            background: none;
            -webkit-background-clip: initial;
            background-clip: initial;
            -webkit-text-fill-color: initial;
            color: #fff;
            letter-spacing: 1px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .login-logo svg {
            color: #fff;
        }

        .login-container p.subtitle {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            color-scheme: dark;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Autofill Styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 40px #121212 inset !important;
            -webkit-text-fill-color: #fff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-group input:focus {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-login {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
        }

        .btn-login:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: #555;
            cursor: not-allowed;
            pointer-events: none;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 14px;
        }

        .footer-links a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .error-msg {
            color: #ff4757;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
            padding: 10px 15px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            border-left: 3px solid #ff4757;
        }

        .success-msg {
            color: #2ed573;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            padding: 10px 15px;
            background: rgba(46, 213, 115, 0.1);
            border-radius: 8px;
            border-left: 3px solid #2ed573;
        }

        .resend-link {
            color: #00f2fe;
            font-size: 14px;
            margin-top: 25px;
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .resend-link:hover {
            color: #4facfe;
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #555;
            cursor: not-allowed;
        }
    </style>
</th:block>

<!-- 2. NỘI DUNG LÕI TRANG FORGOT PASSWORD -->
<main th:fragment="pageContent" class="auth-main">
    <div class="login-container">
        <div class="login-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            <h2>AUDIO<span style="background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">GEAR</span></h2>
        </div>

        <!-- BƯỚC 1: ĐIỀN EMAIL LẤY OTP -->
        <div id="step1">
            <p class="subtitle" style="margin-top: 20px;">Nhập email để nhận mã OTP khôi phục.</p>

            <div id="emailErrorMsg" class="error-msg"></div>

            <form action="" method="post" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" placeholder="VD: email_cua_ban@gmail.com" required>
                </div>
                <button type="submit" class="btn-login" id="sendOtpBtn">Gửi Đi Nhận Mã</button>
            </form>

            <div class="footer-links">
                <a th:href="@{/login}">Quay lại trang Đăng nhập</a>
            </div>
        </div>

        <!-- BƯỚC 2: NHẬP OTP & ĐẶT MẬT KHẨU MỚI -->
        <div id="step2" class="hidden">
            <p class="subtitle">Vui lòng kiểm tra Email (và mục Spam) để lấy mã xác nhận.</p>

            <div id="resetSuccessMsg" class="success-msg">Đã gửi lại mã OTP thành công!</div>
            <div id="resetErrorMsg" class="error-msg">Mã OTP không hợp lệ, vui lòng thử lại.</div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="otpCode">Mã Xác Nhận OTP</label>
                    <input type="text" id="otpCode" name="otpCode" placeholder="Nhập mã 6 số..." maxlength="6" required
                        style="text-align: center; font-size: 20px; letter-spacing: 5px; font-weight: bold;">
                </div>
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn-login" id="resetBtn">Cập nhật Mật khẩu</button>
            </form>

            <span id="resendBtn" class="resend-link disabled">Gửi lại mã (60s)</span>
        </div>
    </div>
</main>

<!-- 3. SCRIPT DÀNH RIÊNG CHO FORGOT PASSWORD -->
<th:block th:fragment="pageScripts">
    <script th:inline="javascript">
        // URLs
        const apiUrlRequest = /*[[@{/api/auth/forgot-password/request}]]*/ '/api/auth/forgot-password/request';
        const apiUrlReset = /*[[@{/api/auth/forgot-password/reset}]]*/ '/api/auth/forgot-password/reset';
        const loginUrl = /*[[@{/login}]]*/ '/login';

        // Biến cục bộ
        let requestedEmail = '';
        let countdownInterval;

        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideError(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // BƯỚC 1: SUBMIT EMAIL NHẬN OTP
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError('emailErrorMsg');

            const btn = document.getElementById('sendOtpBtn');
            btn.textContent = "Đang kiểm tra và gửi mail...";
            btn.disabled = true;

            const email = document.getElementById('email').value;

            await requestOtpApi(email, btn, true);
        });

        // Hàm gọi chung Xin cấp OTP Forget Password
        async function requestOtpApi(emailStr, btnObj, isFirstTime) {
            try {
                const response = await fetch(apiUrlRequest, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailStr })
                });

                const textResponse = await response.text();
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch (e) {
                    throw new Error("Lỗi máy chủ không phản hồi chuẩn cấu trúc. Error Code: " + response.status);
                }

                if (response.ok && result.success) {
                    requestedEmail = emailStr;

                    if (isFirstTime) {
                        step1.classList.add('hidden');
                        step2.classList.remove('hidden');
                        step2.classList.add('fade-in');
                    } else {
                        showSuccess('resetSuccessMsg', "Mã OTP mới đã được gửi đi. Hãy kiểm tra!");
                    }

                    startCountdown();
                } else {
                    if (isFirstTime) {
                        showError('emailErrorMsg', result.message);
                    } else {
                        showError('resetErrorMsg', result.message);
                    }
                }
            } catch (error) {
                if (isFirstTime) {
                    showError('emailErrorMsg', "Lỗi kết nối chặn thao tác: " + error.message);
                } else {
                    showError('resetErrorMsg', "Lỗi gửi lại mã: " + error.message);
                }
            } finally {
                if (btnObj) {
                    btnObj.textContent = isFirstTime ? "Gửi Đi Nhận Mã" : "Gửi lại mã";
                    btnObj.disabled = false;
                }
            }
        }

        // Đếm Countdown
        function startCountdown() {
            const resendBtn = document.getElementById('resendBtn');
            let timeLeft = 60; // 60s

            resendBtn.classList.add('disabled');
            resendBtn.textContent = `Vui lòng đợi (${timeLeft}s)`;

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                resendBtn.textContent = `Vui lòng đợi (${timeLeft}s)`;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    resendBtn.classList.remove('disabled');
                    resendBtn.textContent = "Chưa nhận được mã? Bấm gửi lại";
                }
            }, 1000);
        }

        // BẮT SỰ KIỆN GỬI LẠI MÃ
        document.getElementById('resendBtn').addEventListener('click', async function (e) {
            if (this.classList.contains('disabled')) return;

            hideError('resetErrorMsg');
            this.textContent = "Đang xin cấp quyền...";
            this.classList.add('disabled');

            await requestOtpApi(requestedEmail, this, false);
        });

        // BƯỚC 2: CẬP NHẬT MẬT KHẨU MỚI BẰNG OTP
        document.getElementById('resetPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError('resetErrorMsg');

            const otpCode = document.getElementById('otpCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmPassword) {
                showError('resetErrorMsg', "Mật khẩu xác nhận không khớp! Vui lòng thử lại.");
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.textContent = "Đang xử lý...";
            btn.disabled = true;

            const resetData = {
                email: requestedEmail,
                otp: otpCode,
                newPassword: newPassword
            };

            try {
                const response = await fetch(apiUrlReset, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(resetData)
                });

                const textResponse = await response.text();
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch (e) { throw new Error("Server Error! Không có dữ liệu JSON phản hồi."); }

                if (response.ok && result.success) {
                    // Cập nhật pass thành công -> Chuyển về Login
                    const container = document.querySelector('.login-container');
                    container.innerHTML = `
                        <div class="fade-in" style="padding: 20px;">
                            <h2 style="color: #44bd32; margin-bottom: 10px;">Thành Công!</h2>
                            <p style="color: #353b48; margin-bottom: 25px;">${result.message}</p>
                            <p style="color: #7f8fa6; font-size: 14px;">Đang đưa bạn về Cổng Đăng nhập...</p>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = loginUrl;
                    }, 2500);

                } else {
                    showError('resetErrorMsg', result.message);
                }
            } catch (error) {
                showError('resetErrorMsg', "Mạng gặp lỗi, không thể cập nhật: " + error.message);
            } finally {
                btn.textContent = "Cập nhật Mật khẩu";
                btn.disabled = false;
            }
        });

    </script>
</th:block>

</html>
