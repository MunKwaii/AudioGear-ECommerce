<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: mainLayout('AudioGear - Quên Mật Khẩu', ~{::pageContent}, ~{::pageStyles}, ~{::pageScripts})}">

<!-- 1. STYLE DÀNH RIÊNG -->
<th:block th:fragment="pageStyles">
    <style>
        .auth-main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
            height: 100%;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 10px;
            color: #2f3640;
        }

        .login-container p.subtitle {
            color: #7f8fa6;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #353b48;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0097e6;
        }

        .btn-login {
            background-color: #0097e6;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #00a8ff;
        }

        .btn-login:disabled {
            background-color: #7f8fa6;
            cursor: not-allowed;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-links a {
            color: #0097e6;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Thêm các UI States cho OTP */
        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .error-msg {
            color: #e84118;
            font-size: 13px;
            margin-top: 5px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }

        .success-msg {
            color: #44bd32;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }

        .resend-link {
            color: #0097e6;
            font-size: 14px;
            margin-top: 20px;
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #a4b0be;
            cursor: not-allowed;
            text-decoration: none;
        }
    </style>
</th:block>

<!-- 2. NỘI DUNG LÕI TRANG FORGOT PASSWORD -->
<main th:fragment="pageContent" class="auth-main">
    <div class="login-container">
        <h2>Khôi Phục Mật Khẩu</h2>

        <!-- BƯỚC 1: ĐIỀN EMAIL LẤY OTP -->
        <div id="step1">
            <p class="subtitle">Nhập email đã đăng ký của bạn để nhận mã OTP khôi phục.</p>
            
            <div id="emailErrorMsg" class="error-msg"></div>
            
            <form action="" method="post" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" name="email" placeholder="VD: email_cua_ban@gmail.com" required>
                </div>
                <button type="submit" class="btn-login" id="sendOtpBtn">Gửi Đi Nhận Mã</button>
            </form>

            <div class="footer-links">
                <a th:href="@{/login}">Quay lại trang Đăng nhập</a>
            </div>
        </div>

        <!-- BƯỚC 2: NHẬP OTP & ĐẶT MẬT KHẨU MỚI -->
        <div id="step2" class="hidden">
            <p class="subtitle">Vui lòng kiểm tra Email (và mục Spam) để lấy mã xác nhận.</p>
            
            <div id="resetSuccessMsg" class="success-msg">Đã gửi lại mã OTP thành công!</div>
            <div id="resetErrorMsg" class="error-msg">Mã OTP không hợp lệ, vui lòng thử lại.</div>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="otpCode">Mã Xác Nhận OTP</label>
                    <input type="text" id="otpCode" name="otpCode" placeholder="Nhập mã 6 số..." maxlength="6" required style="text-align: center; font-size: 20px; letter-spacing: 5px; font-weight: bold;">
                </div>
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login" id="resetBtn">Cập nhật Mật khẩu</button>
            </form>
            
            <span id="resendBtn" class="resend-link disabled">Gửi lại mã (60s)</span>
        </div>
    </div>
</main>

<!-- 3. SCRIPT DÀNH RIÊNG CHO FORGOT PASSWORD -->
<th:block th:fragment="pageScripts">
    <script th:inline="javascript">
        // URLs
        const apiUrlRequest = /*[[@{/api/auth/forgot-password/request}]]*/ '/api/auth/forgot-password/request';
        const apiUrlReset = /*[[@{/api/auth/forgot-password/reset}]]*/ '/api/auth/forgot-password/reset';
        const loginUrl = /*[[@{/login}]]*/ '/login';

        // Biến cục bộ
        let requestedEmail = '';
        let countdownInterval;

        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideError(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }

        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // BƯỚC 1: SUBMIT EMAIL NHẬN OTP
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            hideError('emailErrorMsg');

            const btn = document.getElementById('sendOtpBtn');
            btn.textContent = "Đang kiểm tra và gửi mail...";
            btn.disabled = true;

            const email = document.getElementById('email').value;

            await requestOtpApi(email, btn, true);
        });

        // Hàm gọi chung Xin cấp OTP Forget Password
        async function requestOtpApi(emailStr, btnObj, isFirstTime) {
            try {
                const response = await fetch(apiUrlRequest, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailStr })
                });

                const textResponse = await response.text();
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch(e) {
                    throw new Error("Lỗi máy chủ không phản hồi chuẩn cấu trúc. Error Code: " + response.status);
                }
                
                if (response.ok && result.success) {
                    requestedEmail = emailStr;
                    
                    if (isFirstTime) {
                        step1.classList.add('hidden');
                        step2.classList.remove('hidden');
                        step2.classList.add('fade-in');
                    } else {
                        showSuccess('resetSuccessMsg', "Mã OTP mới đã được gửi đi. Hãy kiểm tra!");
                    }
                    
                    startCountdown();
                } else {
                    if (isFirstTime) {
                        showError('emailErrorMsg', result.message);
                    } else {
                        showError('resetErrorMsg', result.message);
                    }
                }
            } catch (error) {
                if (isFirstTime) {
                    showError('emailErrorMsg', "Lỗi kết nối chặn thao tác: " + error.message);
                } else {
                    showError('resetErrorMsg', "Lỗi gửi lại mã: " + error.message);
                }
            } finally {
                if (btnObj) {
                    btnObj.textContent = isFirstTime ? "Gửi Đi Nhận Mã" : "Gửi lại mã";
                    btnObj.disabled = false;
                }
            }
        }

        // Đếm Countdown
        function startCountdown() {
            const resendBtn = document.getElementById('resendBtn');
            let timeLeft = 60; // 60s
            
            resendBtn.classList.add('disabled');
            resendBtn.textContent = `Vui lòng đợi (${timeLeft}s)`;

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                resendBtn.textContent = `Vui lòng đợi (${timeLeft}s)`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    resendBtn.classList.remove('disabled');
                    resendBtn.textContent = "Chưa nhận được mã? Bấm gửi lại";
                }
            }, 1000);
        }

        // BẮT SỰ KIỆN GỬI LẠI MÃ
        document.getElementById('resendBtn').addEventListener('click', async function (e) {
            if (this.classList.contains('disabled')) return;
            
            hideError('resetErrorMsg');
            this.textContent = "Đang xin cấp quyền...";
            this.classList.add('disabled');
            
            await requestOtpApi(requestedEmail, this, false);
        });

        // BƯỚC 2: CẬP NHẬT MẬT KHẨU MỚI BẰNG OTP
        document.getElementById('resetPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError('resetErrorMsg');

            const otpCode = document.getElementById('otpCode').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmPassword) {
                showError('resetErrorMsg', "Mật khẩu xác nhận không khớp! Vui lòng thử lại.");
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.textContent = "Đang xử lý...";
            btn.disabled = true;

            const resetData = {
                email: requestedEmail,
                otp: otpCode,
                newPassword: newPassword
            };

            try {
                const response = await fetch(apiUrlReset, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(resetData)
                });

                const textResponse = await response.text();
                let result;
                try {
                    result = JSON.parse(textResponse);
                } catch(e) { throw new Error("Server Error! Không có dữ liệu JSON phản hồi."); }

                if (response.ok && result.success) {
                    // Cập nhật pass thành công -> Chuyển về Login
                    const container = document.querySelector('.login-container');
                    container.innerHTML = `
                        <div class="fade-in" style="padding: 20px;">
                            <h2 style="color: #44bd32; margin-bottom: 10px;">Thành Công!</h2>
                            <p style="color: #353b48; margin-bottom: 25px;">${result.message}</p>
                            <p style="color: #7f8fa6; font-size: 14px;">Đang đưa bạn về Cổng Đăng nhập...</p>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = loginUrl;
                    }, 2500);

                } else {
                    showError('resetErrorMsg', result.message);
                }
            } catch (error) {
                showError('resetErrorMsg', "Mạng gặp lỗi, không thể cập nhật: " + error.message);
            } finally {
                btn.textContent = "Cập nhật Mật khẩu";
                btn.disabled = false;
            }
        });

    </script>
</th:block>

</html>
