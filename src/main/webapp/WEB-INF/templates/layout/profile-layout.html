<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="profileLayout(title, activePage, content, extraStyles, extraScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">AudioGear Profile</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body {
            font-family: 'Inter', '-apple-system', 'Segoe UI', sans-serif;
            background-color: #050505;
            color: #ecf0f1;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex-grow: 1;
        }

        .profile-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        /* Sidebar Styling */
        .profile-sidebar {
            background-color: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px 0;
            backdrop-filter: blur(12px);
            height: fit-content;
        }

        .user-info-brief {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 16px;
        }

        .user-avatar-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #050505;
        }

        .user-info-text h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .user-info-text p {
            margin: 0;
            font-size: 13px;
            color: #a0a0a0;
        }

        .profile-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 12px;
        }

        .profile-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .profile-nav-item:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .profile-nav-item.active {
            color: #00f2fe;
            background-color: rgba(0, 242, 254, 0.1);
        }

        /* Content Area */
        .profile-content-area {
            background-color: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 32px;
            backdrop-filter: blur(12px);
        }

        .content-header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .content-header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #ffffff;
        }

        .content-header p {
            margin: 0;
            color: #a0a0a0;
            font-size: 14px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #bdc3c7;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background-color: #111111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.15);
        }

        .form-control:disabled {
            background-color: #1a1a1a;
            color: #777;
            cursor: not-allowed;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #050505;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .alert-success {
            background-color: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.3);
            color: #2ed573;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .alert-error {
            background-color: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .profile-sidebar {
                border-radius: 12px;
            }
        }
    </style>

    <th:block th:if="${extraStyles}">
        <th:block th:replace="${extraStyles}"></th:block>
    </th:block>

</head>
<body>
    <!-- Header chung -->
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <main>
        <div class="profile-container">
            <!-- Sidebar -->
            <aside class="profile-sidebar">
                <div class="user-info-brief">
                    <div th:if="${user.avatar}" class="user-avatar-circle" style="background: none; overflow: hidden; border: 2px solid #00f2fe;">
                        <img th:src="@{${user.avatar}}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div th:unless="${user.avatar}" class="user-avatar-circle" th:text="${#strings.substring(currentUserEmail, 0, 1).toUpperCase()}">U</div>
                    <div class="user-info-text">
                        <h3 th:text="${user != null ? user.fullName : 'Thành viên'}">Loading...</h3>
                        <p th:text="${currentUserEmail}">loading...</p>
                    </div>
                </div>
                
                <nav class="profile-nav">
                    <a th:href="@{/profile}" class="profile-nav-item" th:classappend="${activePage == 'profile'} ? 'active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Hồ sơ của tôi
                    </a>
                    <a th:href="@{/profile/addresses}" class="profile-nav-item" th:classappend="${activePage == 'addresses'} ? 'active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Sổ địa chỉ
                    </a>
                    <a th:href="@{/profile/orders}" class="profile-nav-item" th:classappend="${activePage == 'orders'} ? 'active' : ''">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Đơn hàng
                    </a>
                </nav>
            </aside>

            <!-- Content Area -->
            <section class="profile-content-area">
                <th:block th:replace="${content}"></th:block>
            </section>
        </div>
    </main>

    <!-- Footer chung -->
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <th:block th:if="${extraScripts}">
        <th:block th:replace="${extraScripts}"></th:block>
    </th:block>
</body>
</html>
