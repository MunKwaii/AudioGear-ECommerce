<html th:replace="~{layout/profile-layout :: profileLayout('Sổ địa chỉ', 'addresses', ~{::mainContent}, ~{::style}, ~{::script})}">
<style>
    .address-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .address-card {
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background-color: rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    .address-card.default {
        border-color: rgba(0, 242, 254, 0.3);
    }
    .address-info h4 {
        margin: 0 0 8px 0;
        font-size: 16px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .badge-default {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        background-color: rgba(0, 242, 254, 0.15);
        color: #00f2fe;
        font-weight: 600;
        border: 1px solid rgba(0, 242, 254, 0.3);
    }
    .address-info p {
        margin: 4px 0;
        color: #a0a0a0;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .address-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
    }
    .btn-small {
        padding: 6px 12px;
        font-size: 13px;
    }
    .btn-text {
        background: none;
        border: none;
        color: #00f2fe;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        padding: 0;
    }
    .btn-text:hover {
        text-decoration: underline;
    }
    
    /* Modal Styling */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: rgba(0,0,0,0.7);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
    }
    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
    }
    .modal-content {
        background-color: #111;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        transform: translateY(-20px);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal-content {
        transform: translateY(0);
    }
    .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 18px; }
    .close-modal { background: none; border: none; color: #a0a0a0; cursor: pointer; font-size: 20px; }
    .close-modal:hover { color: #fff; }
    .modal-body { padding: 24px; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    select.form-control { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a0a0a0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; padding-right: 2.5rem; }
    
    .empty-state { text-align: center; padding: 40px 0; color: #a0a0a0; }
</style>
<main th:fragment="mainContent">
    <div class="content-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1>Địa chỉ của tôi</h1>
            <p>Quản lý thông tin nhận hàng</p>
        </div>
        <button class="btn btn-primary btn-small" onclick="openModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Thêm địa chỉ mới
        </button>
    </div>

    <!-- Thông báo Alert -->
    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

    <div class="address-list">
        <!-- Vòng lặp list address -->
        <div th:each="addr : ${addresses}" class="address-card" th:classappend="${addr.isDefault} ? 'default' : ''">
            <div class="address-info">
                <h4>
                    <span th:text="${addr.recipientName}">Tên người nhận</span>
                    <span th:if="${addr.isDefault}" class="badge-default">Mặc định</span>
                </h4>
                <p>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <span th:text="${addr.phoneNumber}">09xxxx</span>
                </p>
                <p>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span th:text="${addr.streetAddress + ', ' + addr.ward + ', ' + addr.district + ', ' + addr.province}">Địa chỉ cụ thể...</span>
                </p>
            </div>
            <div class="address-actions">
                <div style="display:flex; gap:16px;">
                    <!-- Nút này mở Modal Edit và điền data -->
                    <button class="btn-text" th:attr="onclick='openEditModal(' + ${addr.id} + ')'" 
                            th:data-id="${addr.id}" th:data-name="${addr.recipientName}" th:data-phone="${addr.phoneNumber}" 
                            th:data-street="${addr.streetAddress}" th:data-province="${addr.provinceCode}" 
                            th:data-district="${addr.districtCode}" th:data-ward="${addr.wardCode}" th:data-default="${addr.isDefault}">Cập nhật</button>
                    <form th:if="${!addr.isDefault}" th:action="@{/profile/addresses/delete}" method="post" style="margin:0;" onsubmit="return confirm('Bạn có chắc chắn muốn xoá địa chỉ này?');">
                        <input type="hidden" name="id" th:value="${addr.id}">
                        <button type="submit" class="btn-text" style="color: #ff4757;">Xoá</button>
                    </form>
                </div>
                <form th:if="${!addr.isDefault}" th:action="@{/profile/addresses/default}" method="post" style="margin:0;">
                    <input type="hidden" name="id" th:value="${addr.id}">
                    <button type="submit" class="btn btn-outline btn-small">Thiết lập mặc định</button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(addresses)}" class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <p>Bạn chưa có địa chỉ nào được lưu.</p>
        </div>
    </div>

    <!-- MODAL THÊM / CẬP NHẬT ĐỊA CHỈ -->
    <div class="modal-overlay" id="addressModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Thêm địa chỉ mới</h3>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="addressForm" th:action="@{/profile/addresses/add}" method="POST">
                    <input type="hidden" name="id" id="formAddrId">
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" name="recipientName" id="formName" class="form-control" required placeholder="Họ và tên người nhận">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" name="phoneNumber" id="formPhone" class="form-control" required placeholder="Số điện thoại nhận hàng">
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Tỉnh/Thành phố</label>
                            <select name="provinceCode" id="provinceSelect" class="form-control" required>
                                <option value="" disabled selected>Chọn Tỉnh/Thành</option>
                            </select>
                            <input type="hidden" name="province" id="provinceName">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Quận/Huyện</label>
                            <select name="districtCode" id="districtSelect" class="form-control" required style="pointer-events: none; opacity: 0.6;">
                                <option value="" disabled selected>Chọn Quận/Huyện</option>
                            </select>
                            <input type="hidden" name="district" id="districtName">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phường/Xã</label>
                        <select name="wardCode" id="wardSelect" class="form-control" required style="pointer-events: none; opacity: 0.6;">
                            <option value="" disabled selected>Chọn Phường/Xã</option>
                        </select>
                        <input type="hidden" name="ward" id="wardName">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Địa chỉ cụ thể</label>
                        <input type="text" name="streetAddress" id="formStreet" class="form-control" required placeholder="Số nhà, tên đường...">
                    </div>

                    <div class="form-group" style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" name="isDefault" id="formDefault" style="width:16px; height:16px;">
                        <label for="formDefault" style="color:#bdc3c7; font-size:14px; cursor:pointer;">Đặt làm địa chỉ mặc định</label>
                    </div>

                    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                        <button type="button" class="btn btn-outline" onclick="closeModal()">Trở lại</button>
                        <button type="submit" class="btn btn-primary">Hoàn thành</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script th:fragment="script" th:inline="javascript">
    function getModal() { return document.getElementById('addressModal'); }
    function getForm() { return document.getElementById('addressForm'); }
    function getModalTitle() { return document.getElementById('modalTitle'); }
    
    function openModal() {
        const modal = getModal();
        const form = getForm();
        const modalTitle = getModalTitle();
        
        if (!form || !modal) return;
        
        form.action = /*[[@{/profile/addresses/add}]]*/ "/profile/addresses/add";
        modalTitle.innerText = 'Thêm địa chỉ mới';
        form.reset();
        document.getElementById('formAddrId').value = '';
        $('#districtSelect').css('pointer-events', 'none').css('opacity', '0.6').html('<option value="" disabled selected>Chọn Quận/Huyện</option>');
        $('#wardSelect').css('pointer-events', 'none').css('opacity', '0.6').html('<option value="" disabled selected>Chọn Phường/Xã</option>');
        modal.classList.add('active');
    }

    function openEditModal(btnId) {
        const modal = getModal();
        const form = getForm();
        const modalTitle = getModalTitle();
        
        if (!form || !modal) return;
        
        form.action = /*[[@{/profile/addresses/edit}]]*/ "/profile/addresses/edit";
        modalTitle.innerText = 'Cập nhật địa chỉ';
        
        // Find button element that triggered this
        const btn = document.querySelector(`button[data-id="${btnId}"]`);
        
        document.getElementById('formAddrId').value = btn.getAttribute('data-id');
        document.getElementById('formName').value = btn.getAttribute('data-name');
        document.getElementById('formPhone').value = btn.getAttribute('data-phone');
        document.getElementById('formStreet').value = btn.getAttribute('data-street');
        document.getElementById('formDefault').checked = btn.getAttribute('data-default') === 'true';
        
        // Load cascade API selections
        const provCode = btn.getAttribute('data-province');
        const distCode = btn.getAttribute('data-district');
        const wardCode = btn.getAttribute('data-ward');
        
        $('#provinceSelect').val(provCode).trigger('change');
        
        // Need to wait for district load
        setTimeout(() => {
            $('#districtSelect').val(distCode).trigger('change');
            setTimeout(() => {
                $('#wardSelect').val(wardCode).trigger('change');
            }, 500);
        }, 500);

        modal.classList.add('active');
    }

    function closeModal() {
        const modal = getModal();
        if (modal) modal.classList.remove('active');
    }

    // Logic Tích hợp API Hành chính Việt Nam
    $(document).ready(function() {
        // Load Provinces
        $.ajax({
            url: 'https://provinces.open-api.vn/api/p/',
            method: 'GET',
            success: function(data) {
                let options = '<option value="" disabled selected>Chọn Tỉnh/Thành</option>';
                data.forEach(p => {
                    options += `<option value="${p.code}" data-name="${p.name}">${p.name}</option>`;
                });
                $('#provinceSelect').html(options);
            }
        });

        // On Province Change -> Load Districts
        $('#provinceSelect').change(function() {
            const pCode = $(this).val();
            const pName = $(this).find('option:selected').data('name');
            $('#provinceName').val(pName); // Set hidden field
            
            $('#districtSelect').css('pointer-events', 'none').css('opacity', '0.6').html('<option value="" disabled selected>Đang tải...</option>');
            $('#wardSelect').css('pointer-events', 'none').css('opacity', '0.6').html('<option value="" disabled selected>Chọn Phường/Xã</option>');
            
            if (!pCode) return;
            
            $.ajax({
                url: `https://provinces.open-api.vn/api/p/${pCode}?depth=2`,
                method: 'GET',
                success: function(data) {
                    let options = '<option value="" disabled selected>Chọn Quận/Huyện</option>';
                    data.districts.forEach(d => {
                        options += `<option value="${d.code}" data-name="${d.name}">${d.name}</option>`;
                    });
                    $('#districtSelect').css('pointer-events', 'auto').css('opacity', '1').html(options);
                }
            });
        });

        // On District Change -> Load Wards
        $('#districtSelect').change(function() {
            const dCode = $(this).val();
            const dName = $(this).find('option:selected').data('name');
            $('#districtName').val(dName); // Set hidden field
            
            $('#wardSelect').css('pointer-events', 'none').css('opacity', '0.6').html('<option value="" disabled selected>Đang tải...</option>');
            
            if (!dCode) return;
            
            $.ajax({
                url: `https://provinces.open-api.vn/api/d/${dCode}?depth=2`,
                method: 'GET',
                success: function(data) {
                    let options = '<option value="" disabled selected>Chọn Phường/Xã</option>';
                    data.wards.forEach(w => {
                        options += `<option value="${w.code}" data-name="${w.name}">${w.name}</option>`;
                    });
                    $('#wardSelect').css('pointer-events', 'auto').css('opacity', '1').html(options);
                }
            });
        });

        // On Ward Change
        $('#wardSelect').change(function() {
            const wName = $(this).find('option:selected').data('name');
            $('#wardName').val(wName);
        });
    });
</script>
</html>
