<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout/base :: mainLayout('AudioGear - Đăng Nhập', ~{::pageContent}, ~{::pageStyles}, ~{::pageScripts})}">

<!-- 1. STYLE DÀNH RIÊNG CHO TRANG LOGIN -->
<th:block th:fragment="pageStyles">
    <style>
        .auth-main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            min-height: calc(100vh - 200px);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 0;
            font-size: 28px;
            font-weight: 800;
            background: none;
            -webkit-background-clip: initial;
            background-clip: initial;
            -webkit-text-fill-color: initial;
            color: #fff;
            letter-spacing: 1px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .login-logo svg {
            color: #fff;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #a0a0a0;
            font-size: 13px;
            font-weight: 500;
            padding-left: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            color-scheme: dark;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent, #00f2fe);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Autofill Styling */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 40px #121212 inset !important;
            -webkit-text-fill-color: #fff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-group input:focus {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-login {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
        }

        .divider {
            margin: 35px 0;
            display: flex;
            align-items: center;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .divider::before {
            margin-right: 20px;
        }

        .divider::after {
            margin-left: 20px;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            background: #fff;
            border-radius: 50px;
            /* Pillow shape for google wrapper */
            overflow: hidden;
            padding: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .google-btn-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255, 255, 255, 0.1);
        }
    </style>
    </style>
</th:block>

<!-- 2. NỘI DUNG LÕI TRANG LOGIN -->
<main th:fragment="pageContent" class="auth-main">
    <div class="login-container">
        <div class="login-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            <h2>AUDIO<span
                    style="background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">GEAR</span>
            </h2>
        </div>

        <p
            style="color: #a0a0a0; margin-bottom: 40px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">
            Đăng nhập tài khoản</p>

        <!-- Hiển thị lỗi nếu đăng nhập thất bại -->
        <div th:if="${errorMessage}"
            style="background: rgba(255, 71, 87, 0.1); color: #ff4757; padding: 15px; margin-bottom: 30px; border-radius: 50px; font-size: 14px; border: 1px solid rgba(255, 71, 87, 0.2);">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <!-- Đăng nhập truyền thống -->
        <form action="" method="post">
            <div class="form-group">
                <label for="usernameOrEmail">Email hoặc Tên đăng nhập</label>
                <input type="text" id="usernameOrEmail" name="usernameOrEmail" placeholder="Nhập email của bạn..."
                    required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập ngay</button>
        </form>

        <div style="margin-top: 25px; font-size: 14px; display: flex; justify-content: space-between; padding: 0 10px;">
            <a th:href="@{/forgot-password}" style="color: #00f2fe; text-decoration: none; font-weight: 500;">Quên mật
                khẩu?</a>
            <a th:href="@{/register}" style="color: #00f2fe; text-decoration: none; font-weight: 500;">Đăng ký tại
                đây</a>
        </div>

        <div class="divider">HOẶC</div>

        <!-- TÍCH HỢP GOOGLE LOGIN -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                data-client_id="161916572109-5iu1i7ibo1ub02oqsd6f8h67aqn0n65c.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" th:data-login_uri="@{/api/auth/google}"
                data-auto_prompt="false">
            </div>

            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with"
                data-size="large" data-logo_alignment="left">
            </div>
        </div>
    </div>
</main>

<!-- 3. SCRIPT DÀNH RIÊNG CHO LOGIN (Google Auth) -->
<th:block th:fragment="pageScripts">
    <!-- Trạm nhúng thư viện Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</th:block>

</html>
