<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: mainLayout('AudioGear - Đăng Nhập', ~{::pageContent}, ~{::pageStyles}, ~{::pageScripts})}">

<!-- 1. STYLE DÀNH RIÊNG CHO TRANG LOGIN -->
<th:block th:fragment="pageStyles">
    <style>
        .auth-main {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            min-height: calc(100vh - 200px);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 35px;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-login {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #000;
            padding: 16px;
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
        }

        .divider {
            margin: 35px 0;
            display: flex;
            align-items: center;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .divider::before {
            margin-right: 20px;
        }

        .divider::after {
            margin-left: 20px;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            padding: 5px;
        }
    </style>
</th:block>

<!-- 2. NỘI DUNG LÕI TRANG LOGIN -->
<main th:fragment="pageContent" class="auth-main">
    <div class="login-container">
        <h2>AudioGear Login</h2>

        <!-- Hiển thị lỗi nếu đăng nhập thất bại -->
        <div th:if="${errorMessage}" style="background: #ffeaa7; color: #d63031; padding: 10px; margin-bottom: 20px; border-radius: 4px; font-size: 14px;">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Đăng nhập truyền thống -->
        <form action="" method="post">
            <div class="form-group">
                <label for="usernameOrEmail">Email hoặc Tên đăng nhập</label>
                <input type="text" id="usernameOrEmail" name="usernameOrEmail" placeholder="Nhập email của bạn..."
                    required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập cục bộ</button>
        </form>

        <div style="margin-top: 15px; font-size: 14px; display: flex; justify-content: space-between;">
            <a th:href="@{/forgot-password}" style="color: #0097e6; text-decoration: none;">Quên mật khẩu?</a>
            <a th:href="@{/register}" style="color: #0097e6; text-decoration: none;">Đăng ký tại đây</a>
        </div>

        <div class="divider">HOẶC</div>

        <!-- TÍCH HỢP GOOGLE LOGIN: Bấm vào mở cửa sổ Popup -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                data-client_id="161916572109-5iu1i7ibo1ub02oqsd6f8h67aqn0n65c.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" th:data-login_uri="@{/api/auth/google}"
                data-auto_prompt="false">
                <!-- th:data-login_uri: Thymeleaf sẽ tự động sinh đường dẫn /AudioGear_ECommerce_war_exploded/api/auth/google -->
            </div>

            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left">
            </div>
        </div>
    </div>
</main>

<!-- 3. SCRIPT DÀNH RIÊNG CHO LOGIN (Google Auth) -->
<th:block th:fragment="pageScripts">
    <!-- Trạm nhúng thư viện Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</th:block>

</html>
