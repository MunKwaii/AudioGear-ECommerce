<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - AudioGear'">Checkout - AudioGear</title>
    <!-- Use the same Google Fonts as Home -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0a0a0c;
            --surface-color: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --text-main: #f0f0f0;
            --text-muted: #8892b0;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
            display: flex;
            flex-direction: column;
        }

        .checkout-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            flex: 1;
        }

        h1.page-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            grid-column: 1 / -1;
            font-weight: 700;
        }

        /* Forms Glass Panels */
        .glass-panel {
            background: var(--surface-color);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary-glow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary-glow);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        /* Items summary on right */
        .order-summary {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .item-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #1a1a1a;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .payment-option input {
            margin-right: 15px;
            accent-color: var(--primary-glow);
        }

        .payment-option.selected {
            border-color: var(--primary-glow);
            background: rgba(0, 242, 254, 0.05);
        }

        .totals {
            margin-top: 25px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .grand-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .grand-total .amount {
            color: var(--primary-glow);
        }

        .btn-confirm {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            border-radius: 15px;
            color: #000;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
        }

        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
        }

        .btn-confirm:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Loading indicator */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Header Fragment -->
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <div class="checkout-container">
        <h1 class="page-title">Thanh Toán</h1>

        <!-- Left Column: Delivery & Payment -->
        <div class="checkout-details">
            <div class="glass-panel">
                <h2 class="section-title"><i class="fas fa-truck"></i> Thông tin giao hàng</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Họ và tên nhận hàng</label>
                        <input type="text" id="recipientName" required placeholder="Nhập họ tên đầy đủ">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="tel" id="phoneNumber" required placeholder="Nhập số điện thoại">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" required placeholder="Địa chỉ email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Địa chỉ cụ thể (Số nhà, Tên đường, Phường/Xã)</label>
                        <textarea id="streetAddress" required rows="3" placeholder="Ví dụ: 123 Đường Võ Văn Ngân, Linh Chiểu"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Thành phố / Tỉnh</label>
                            <input type="text" id="city" required placeholder="Ví dụ: TP. Hồ Chí Minh">
                        </div>
                        <div class="form-group">
                            <label>Mã giảm giá (nếu có)</label>
                            <input type="text" id="voucherCode" placeholder="Nhập mã ưu đãi">
                        </div>
                    </div>
                </form>
            </div>

            <div class="glass-panel">
                <h2 class="section-title"><i class="fas fa-credit-card"></i> Phương thức thanh toán</h2>
                
                <label class="payment-option selected">
                    <input type="radio" name="paymentMethod" value="COD" checked>
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">Thanh toán khi nhận hàng (COD)</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted)">Giao hàng và thu tiền tận nơi</div>
                    </div>
                    <i class="fas fa-money-bill-wave" style="margin-left: auto; color: var(--success); font-size: 1.5rem"></i>
                </label>

                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="STORE_PICKUP">
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">Nhận tại cửa hàng</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted)">Nhận hàng và thanh toán tại AudioGear</div>
                    </div>
                    <i class="fas fa-store" style="margin-left: auto; color: var(--secondary-glow); font-size: 1.5rem"></i>
                </label>
            </div>
        </div>

        <!-- Right Column: Summary -->
        <div class="order-summary">
            <div class="glass-panel">
                <h2 class="section-title"><i class="fas fa-shopping-bag"></i> Tóm tắt sản phẩm</h2>
                
                <div class="items-list">
                    <div class="summary-item" th:each="item : ${cart.items}">
                        <img th:src="${item.productThumbnail}" class="item-img" alt="Product">
                        <div class="item-info">
                            <div class="item-name" th:text="${item.productName}">Product Name</div>
                            <div class="item-meta">
                                <span th:text="${'x' + item.quantity}">x1</span>
                                <span th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT') + '₫'}">1,000,000₫</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="totals">
                    <div class="total-row">
                        <span>Tạm tính</span>
                        <span th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + '₫'}">1,000,000₫</span>
                    </div>
                    <div class="total-row">
                        <span>Voucher giảm giá</span>
                        <span id="voucher-discount">-0₫</span>
                    </div>
                    <div class="total-row">
                        <span>Phí vận chuyển</span>
                        <span>0₫</span>
                    </div>
                    <div class="grand-total">
                        <span>Tổng thanh toán</span>
                        <span class="amount" th:text="${#numbers.formatDecimal(cart.totalAmount, 0, 'COMMA', 0, 'POINT') + '₫'}">1,000,000₫</span>
                    </div>
                </div>

                <button type="button" id="btn-confirm-checkout" class="btn-confirm">Xác nhận thanh toán</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p>Đang xử lý đơn hàng của bạn...</p>
    </div>

    <!-- Footer Fragment -->
    <footer th:replace="~{fragments/footer :: footerFragment}"></footer>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const contextPath = /*[[@{/}]]*/ '/';
        const cartItems = /*[[${cart.items}]]*/ [];
        /*]]>*/
    </script>
    <script th:src="@{/static/js/checkout.js}"></script>
</body>
</html>
